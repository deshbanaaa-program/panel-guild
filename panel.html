<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL GUILD · liquid glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a0a;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            color: #ddd;
            background-image: radial-gradient(circle at 70% 20%, rgba(100,100,100,0.05) 0%, transparent 40%);
        }
        .panel-container {
            max-width: 1300px;
            width: 100%;
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 48px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 30px 50px -20px black, inset 0 1px 2px rgba(255,255,255,0.03);
        }
        h1, h2 {
            font-weight: 300;
            letter-spacing: 1px;
            color: #e0e0e0;
        }
        h1 i, h2 i { color: #9a9a9a; margin-right: 15px; }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .header-panel a {
            color: #b0b0b0;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 28px;
            border-radius: 40px;
            transition: 0.2s;
            background: rgba(0,0,0,0.3);
        }
        .header-panel a:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(30,30,30,0.8);
            color: white;
        }

        /* form style */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .input-field {
            background: rgba(10,10,10,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 12px 22px;
            color: #f0f0f0;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            width: 100%;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(255,255,255,0.25);
            background: rgba(30,30,30,0.8);
        }
        .btn {
            background: rgba(40,40,40,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 30px;
            border-radius: 40px;
            color: #e0e0e0;
            font-weight: 300;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.15s;
            font-size: 1rem;
        }
        .btn:hover {
            background: rgba(70,70,70,0.9);
            border-color: rgba(255,255,255,0.2);
            color: white;
        }
        .btn-danger {
            background: rgba(120, 30, 30, 0.4);
            border-color: rgba(200, 80, 80, 0.2);
        }
        .btn-danger:hover { background: rgba(160, 40, 40, 0.6); }

        .list-item {
            background: rgba(30,30,30,0.5);
            border-radius: 40px;
            padding: 15px 25px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .member-item {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .member-item span { color: #bbb; }
        .member-actions button, .list-actions button {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 8px 18px;
            margin-left: 8px;
            color: #ccc;
            cursor: pointer;
            transition: 0.1s;
        }
        .member-actions button:hover { background: rgba(255,255,255,0.1); }

        .add-section {
            margin-top: 25px;
            background: rgba(20,20,20,0.5);
            border-radius: 50px;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        hr { border: 0.5px solid rgba(255,255,255,0.05); margin: 35px 0; }
    </style>
</head>
<body>
<div class="panel-container">
    <!-- header -->
    <div class="glass-panel" style="padding: 25px 35px;">
        <div class="header-panel">
            <h1><i class="fas fa-sliders-h"></i> PANEL GUILD — liquid glass</h1>
            <a href="7s-area-website.html"><i class="fas fa-arrow-left"></i> kembali ke website</a>
        </div>
        <p style="color:#888; margin-top: 5px;"><i class="fas fa-dragon"></i> owner / authorized person : ubah data guild secara langsung</p>
    </div>

    <!-- FORM INFO GUILD -->
    <div class="glass-panel" id="infoPanel">
        <h2><i class="fas fa-shield"></i> Informasi Guild</h2>
        <div class="form-grid" id="infoFormGrid"></div>
        <button class="btn" id="updateInfoBtn"><i class="fas fa-save"></i> Simpan Perubahan Info</button>
    </div>

    <!-- EVENT MANAGER -->
    <div class="glass-panel">
        <h2><i class="fas fa-calendar"></i> Event (Kotak 1)</h2>
        <div id="eventListPanel"></div>
        <div class="add-section">
            <input type="text" id="newEventInput" class="input-field" placeholder="Tulis event baru..." style="flex:3;">
            <button class="btn" id="addEventBtn"><i class="fas fa-plus-circle"></i> Tambah Event</button>
        </div>
    </div>

    <!-- PENGUMUMAN MANAGER -->
    <div class="glass-panel">
        <h2><i class="fas fa-bullhorn"></i> Pengumuman (Kotak 2)</h2>
        <div id="announceListPanel"></div>
        <div class="add-section">
            <input type="text" id="newAnnounceInput" class="input-field" placeholder="Tulis pengumuman..." style="flex:3;">
            <button class="btn" id="addAnnounceBtn"><i class="fas fa-plus-circle"></i> Tambah Pengumuman</button>
        </div>
    </div>

    <!-- MEMBER CARD MANAGER -->
    <div class="glass-panel">
        <h2><i class="fas fa-id-card"></i> Daftar Member (Card)</h2>
        <div id="memberListPanel"></div>

        <!-- form tambah/edit member -->
        <div class="add-section" style="flex-wrap: wrap;">
            <input type="text" id="memberIdInput" class="input-field" placeholder="ID member" style="min-width:200px;">
            <input type="text" id="memberNickInput" class="input-field" placeholder="Nick name" style="min-width:200px;">
            <button class="btn" id="addMemberBtn"><i class="fas fa-user-plus"></i> Tambah Member</button>
            <button class="btn" id="cancelEditMemberBtn" style="display:none;">Batal</button>
        </div>
        <p id="editHint" style="color: #6a6a6a; margin-top: 10px;"></p>
    </div>

    <!-- DANGER ZONE : hapus semua -->
    <div class="glass-panel" style="border-color: rgba(200,60,60,0.2);">
        <h2 style="color:#d88;"><i class="fas fa-trash-alt"></i> Area Berbahaya</h2>
        <button class="btn btn-danger" id="clearAllBtn"><i class="fas fa-exclamation-triangle"></i> Hapus Semua Data (reset)</button>
    </div>
</div>

<script>
    (function() {
        // ----- data default (sama dengan halaman utama) -----
        const DEFAULT_DATA = {
            guildInfo: {
                status: "Active",
                anggota: 12,
                maxAnggota: 35,
                idGuild: "3092227355",
                level: 4,
                ketuaId: "8743326768",
                officerId: "6328036149",
                waLink: "https://chat.whatsapp.com/GgJeGmn6As44jaV1AeUTUE"
            },
            events: [
                "🎯 Raid boss • Jumat 20.00 WIB (wajib hadir)",
                "⚔️ Guild war • Sabtu 19.00 WIB — push tier"
            ],
            announcements: [
                "📢 Selamat datang member baru! Harap baca rules.",
                "📢 Penggunaan bot discord sudah aktif.",
                "📢 Jangan lupa claim hadiah harian."
            ],
            members: [
                { id: "8743326768", nick: "ShadowKing" },
                { id: "6328036149", nick: "LunaRose" },
                { id: "1987463520", nick: "Raven" },
                { id: "4455667788", nick: "Zenitsu" },
                { id: "1122334455", nick: "Nezuko" }
            ]
        };

        // helper baca/tulis storage
        function loadData() {
            let stored = localStorage.getItem('guildData');
            if (stored) {
                try { return JSON.parse(stored); } catch { return DEFAULT_DATA; }
            } else {
                localStorage.setItem('guildData', JSON.stringify(DEFAULT_DATA));
                return DEFAULT_DATA;
            }
        }
        function saveData(data) {
            localStorage.setItem('guildData', JSON.stringify(data));
        }

        let data = loadData();

        // ---------- RENDER INFO FORM (guildInfo) ----------
        function renderInfoForm() {
            const g = data.guildInfo;
            const formGrid = document.getElementById('infoFormGrid');
            formGrid.innerHTML = `
                <div><label>Status</label><input class="input-field" id="statusInput" value="${g.status}"></div>
                <div><label>Anggota</label><input class="input-field" id="anggotaInput" type="number" value="${g.anggota}"></div>
                <div><label>Max Anggota</label><input class="input-field" id="maxAnggotaInput" type="number" value="${g.maxAnggota}"></div>
                <div><label>ID Guild</label><input class="input-field" id="idGuildInput" value="${g.idGuild}"></div>
                <div><label>Level</label><input class="input-field" id="levelInput" type="number" value="${g.level}"></div>
                <div><label>Ketua ID</label><input class="input-field" id="ketuaIdInput" value="${g.ketuaId}"></div>
                <div><label>Officer ID</label><input class="input-field" id="officerIdInput" value="${g.officerId}"></div>
                <div><label>Link WA</label><input class="input-field" id="waLinkInput" value="${g.waLink}"></div>
            `;
        }
        document.getElementById('updateInfoBtn').addEventListener('click', function() {
            data.guildInfo = {
                status: document.getElementById('statusInput').value,
                anggota: parseInt(document.getElementById('anggotaInput').value) || 0,
                maxAnggota: parseInt(document.getElementById('maxAnggotaInput').value) || 0,
                idGuild: document.getElementById('idGuildInput').value,
                level: parseInt(document.getElementById('levelInput').value) || 0,
                ketuaId: document.getElementById('ketuaIdInput').value,
                officerId: document.getElementById('officerIdInput').value,
                waLink: document.getElementById('waLinkInput').value
            };
            saveData(data);
            renderEventList(); renderAnnounceList(); renderMemberList(); // perbarui semua panel
            alert('Info guild tersimpan');
        });

        // ---------- RENDER EVENT LIST (dengan tombol hapus) ----------
        function renderEventList() {
            const container = document.getElementById('eventListPanel');
            if (data.events.length === 0) container.innerHTML = '<div class="list-item" style="color:#666;">Belum ada event</div>';
            else {
                container.innerHTML = data.events.map((ev, idx) => `
                    <div class="list-item">
                        <span><i class="fas fa-calendar-check" style="margin-right:12px;"></i>${ev}</span>
                        <div class="list-actions">
                            <button class="delete-event" data-index="${idx}"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                `).join('');
            }
            // pasang listener hapus
            document.querySelectorAll('.delete-event').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const index = this.dataset.index;
                    data.events.splice(index, 1);
                    saveData(data);
                    renderEventList();
                });
            });
        }
        document.getElementById('addEventBtn').addEventListener('click', function() {
            const newEv = document.getElementById('newEventInput').value.trim();
            if (newEv) { data.events.push(newEv); saveData(data); renderEventList(); document.getElementById('newEventInput').value = ''; }
        });

        // ---------- RENDER ANNOUNCEMENT LIST ----------
        function renderAnnounceList() {
            const container = document.getElementById('announceListPanel');
            if (data.announcements.length === 0) container.innerHTML = '<div class="list-item" style="color:#666;">Tidak ada pengumuman</div>';
            else {
                container.innerHTML = data.announcements.map((ann, idx) => `
                    <div class="list-item">
                        <span><i class="fas fa-volume-low" style="margin-right:12px;"></i>${ann}</span>
                        <div class="list-actions">
                            <button class="delete-announce" data-index="${idx}"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                `).join('');
            }
            document.querySelectorAll('.delete-announce').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = this.dataset.index;
                    data.announcements.splice(index, 1);
                    saveData(data);
                    renderAnnounceList();
                });
            });
        }
        document.getElementById('addAnnounceBtn').addEventListener('click', function() {
            const newAnn = document.getElementById('newAnnounceInput').value.trim();
            if (newAnn) { data.announcements.push(newAnn); saveData(data); renderAnnounceList(); document.getElementById('newAnnounceInput').value = ''; }
        });

        // ---------- RENDER MEMBER LIST + tombol edit/hapus ----------
        let editMemberIndex = null; // untuk mode edit
        function renderMemberList() {
            const container = document.getElementById('memberListPanel');
            if (data.members.length === 0) container.innerHTML = '<div class="list-item">Belum ada member. Tambah melalui form di bawah.</div>';
            else {
                container.innerHTML = data.members.map((m, idx) => `
                    <div class="list-item member-item">
                        <span><i class="fas fa-id-badge"></i> <strong>${m.id}</strong>  |  <i class="fas fa-pen"></i> ${m.nick}</span>
                        <div class="member-actions">
                            <button class="edit-member" data-index="${idx}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-member" data-index="${idx}"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                `).join('');
            }
            // hapus member
            document.querySelectorAll('.delete-member').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = this.dataset.index;
                    data.members.splice(idx, 1);
                    saveData(data);
                    renderMemberList();
                });
            });
            // edit member -> isi form dengan data, ganti tombol
            document.querySelectorAll('.edit-member').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = this.dataset.index;
                    const m = data.members[idx];
                    document.getElementById('memberIdInput').value = m.id;
                    document.getElementById('memberNickInput').value = m.nick;
                    document.getElementById('addMemberBtn').innerHTML = '<i class="fas fa-pen"></i> Update Member';
                    document.getElementById('cancelEditMemberBtn').style.display = 'inline-block';
                    editMemberIndex = idx;
                });
            });
        }

        // tambah / update member
        document.getElementById('addMemberBtn').addEventListener('click', function() {
            const id = document.getElementById('memberIdInput').value.trim();
            const nick = document.getElementById('memberNickInput').value.trim();
            if (!id || !nick) { alert('ID dan Nick harus diisi'); return; }

            if (editMemberIndex !== null) {
                // update existing
                data.members[editMemberIndex] = { id, nick };
                editMemberIndex = null;
                document.getElementById('addMemberBtn').innerHTML = '<i class="fas fa-user-plus"></i> Tambah Member';
                document.getElementById('cancelEditMemberBtn').style.display = 'none';
            } else {
                // tambah baru
                data.members.push({ id, nick });
            }
            saveData(data);
            renderMemberList();
            document.getElementById('memberIdInput').value = '';
            document.getElementById('memberNickInput').value = '';
        });

        document.getElementById('cancelEditMemberBtn').addEventListener('click', function() {
            editMemberIndex = null;
            document.getElementById('memberIdInput').value = '';
            document.getElementById('memberNickInput').value = '';
            document.getElementById('addMemberBtn').innerHTML = '<i class="fas fa-user-plus"></i> Tambah Member';
            this.style.display = 'none';
        });

        // hapus semua data (reset ke array kosong + info guild minimal)
        document.getElementById('clearAllBtn').addEventListener('click', function() {
            if (confirm('⚠️ Semua data guild, event, pengumuman, dan member akan dihapus. Lanjutkan?')) {
                const emptyData = {
                    guildInfo: { status: "", anggota: 0, maxAnggota: 0, idGuild: "", level: 0, ketuaId: "", officerId: "", waLink: "" },
                    events: [],
                    announcements: [],
                    members: []
                };
                data = emptyData;
                saveData(data);
                // re-render semua
                renderInfoForm();
                renderEventList();
                renderAnnounceList();
                renderMemberList();
            }
        });

        // inisialisasi semua render
        renderInfoForm();
        renderEventList();
        renderAnnounceList();
        renderMemberList();

        // sinkron jika ada perubahan dari tab lain
        window.addEventListener('storage', function(e) {
            if (e.key === 'guildData') {
                try { data = JSON.parse(e.newValue); } catch { }
                renderInfoForm(); renderEventList(); renderAnnounceList(); renderMemberList();
            }
        });
    })();
</script>
</body>
</html>
